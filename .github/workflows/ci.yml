name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  format:
    name: black
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - run: pip install black==26.1.0
      - run: black --check --diff .

  typecheck:
    name: pyright
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - run: pip install pyright==1.1.411
      - run: pyright
